<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احتفالية الفائزين وتوزيع الهدايا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a; /* Dark slate */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            color: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
            cursor: pointer;
        }

        /* Slide Transitions */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Modern Image Wrapper */
        .img-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 215, 0, 0.2); /* إطار ذهبي نحيف جداً وأنيق */
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            background-color: #1e293b;
        }

        /* Elegant Entrance Animation */
        .slide.active .img-wrapper {
            animation: elegantSlideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes elegantSlideUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Image Styling (Cover completely) */
        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center;
            will-change: transform;
        }

        /* Smooth Ken Burns Effects */
        .slide.active .zoom-in { animation: kenBurnsIn 12s ease-out forwards; }
        .slide.active .zoom-out { animation: kenBurnsOut 12s ease-out forwards; }

        @keyframes kenBurnsIn {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        @keyframes kenBurnsOut {
            0% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Winners Grid Animation */
        .winner-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .winner-card:hover {
            transform: translateY(-5px) scale(1.02) !important;
            border-color: rgba(255, 215, 0, 0.8);
        }

        .slide.active .winner-card {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Start Overlay */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            cursor: default;
        }

        /* Gold Text Gradient */
        .text-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Pause Indicator Overlay */
        #pause-indicator {
            transition: opacity 0.4s ease;
        }

        /* Custom Scrollbar */
        .winners-container::-webkit-scrollbar { width: 6px; }
        .winners-container::-webkit-scrollbar-track { background: transparent; }
        .winners-container::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.5); border-radius: 10px; }
        .winners-container::-webkit-scrollbar-thumb:hover { background: rgba(191, 149, 63, 0.8); }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=ambient-piano-amp-strings-10711.mp3" type="audio/mpeg">
    </audio>
    <audio id="clap-sound">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c1db35168.mp3?filename=applause-2-103953.mp3" type="audio/mpeg">
    </audio>

    <!-- Pause Indicator Overlay (Hidden by default) -->
    <div id="pause-indicator" class="fixed inset-0 z-40 flex items-center justify-center pointer-events-none opacity-0 bg-black/50 backdrop-blur-sm">
        <div class="bg-white/10 p-8 rounded-full border border-white/20 shadow-[0_0_50px_rgba(255,215,0,0.2)]">
            <svg class="w-24 h-24 text-white drop-shadow-2xl" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
            </svg>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" onclick="event.stopPropagation();">
        <h1 class="text-6xl font-extrabold mb-10 text-gold text-center leading-relaxed drop-shadow-2xl">احتفالية توزيع الهدايا<br>وتكريم الفائزين</h1>
        <button onclick="startCelebration()" class="px-12 py-5 bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600 text-black font-bold rounded-full text-2xl hover:scale-105 transition transform shadow-[0_0_30px_rgba(255,215,0,0.5)] border border-yellow-300">
            ابدأ العرض الاحتفالي ▶
        </button>
    </div>

    <!-- Main Slides Container -->
    <div id="slider-container" class="relative w-full h-screen">
        <!-- Slides will be injected here via JavaScript -->
    </div>

    <script>
        // Data Configuration
        const winnersData = [
            { region: "الفائزون إقليم شمال الرياض و تبوك", details: "م 1056 تبوك بارك 2 - تبوك" },
            { region: "الفائزون إقليم المدينة والمولات", details: "م 920 مركز المحمل - جده" },
            { region: "الفائزون إقليم الشمالية", details: "م 1220 السوق التجاري - الرس" },
            { region: "الفائزون إقليم جنوب الرياض", details: "م 859 السلام مول 2 - الرياض" },
            { region: "الفائزون إقليم الساحل", details: "م 131 القوز - الباحه" },
            { region: "الفائزون إقليم جده وينبع", details: "م 1232 سوق 7 - جدة" },
            { region: "الفائزون إقليم الشرقية", details: "م 1147 حي الروضة 2 - الدمام" },
            { region: "الفائزون إقليم الجنوب", details: "م 123 محايل عسير1 - محايل" },
            { region: "الفائزون إقليم مكة والطائف", details: "م 448 الزايدي - مكه" }
        ];

        const imagesData = [
            "IMG_2427.JPG", "IMG_2428.JPG", "IMG_2429.JPG", "IMG_2430.JPG", "IMG_2431.JPG", 
            "IMG_2432.JPG", "IMG_2434.JPG", "IMG_2435.JPG", "IMG_2436.JPG", "IMG_2437.JPG", 
            "IMG_2440.JPG", "IMG_2441.JPG", "IMG_2443.JPG"
        ];

        const videosData = [
            "MVI_2444.MP4", "MVI_2445.MP4", "MVI_2446.MP4", "MVI_2447.MP4"
        ];

        // State Variables
        let currentSlide = 0;
        let isPlaying = true;
        let slideInterval;
        let totalSlides = 0;
        const slideDuration = 6000; // 6 ثواني لكل شريحة

        const container = document.getElementById('slider-container');
        const bgMusic = document.getElementById('bg-music');
        const clapSound = document.getElementById('clap-sound');
        const pauseIndicator = document.getElementById('pause-indicator');

        // Setup Audio
        bgMusic.volume = 0.4;
        clapSound.volume = 0.8;

        // Initialize App
        function buildSlides() {
            let html = '';
            let slideIndex = 0;

            // 1. Winners Slide
            let winnersCards = winnersData.map((w, index) => `
                <div class="winner-card rounded-2xl p-6 text-center flex flex-col justify-center" style="animation-delay: ${index * 0.15}s">
                    <h3 class="text-yellow-400 font-bold text-2xl mb-3">${w.region}</h3>
                    <p class="text-gray-200 text-xl font-semibold">${w.details}</p>
                </div>
            `).join('');

            html += `
                <div class="slide active" id="slide-${slideIndex++}" data-type="winners">
                    <div class="w-11/12 max-w-7xl h-full flex flex-col justify-center py-10">
                        <h2 class="text-6xl font-bold text-center text-gold mb-12 drop-shadow-2xl">نجوم الأقاليم الفائزين</h2>
                        <div class="winners-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto pb-10 px-4" style="max-height: 70vh;">
                            ${winnersCards}
                        </div>
                    </div>
                </div>
            `;

            // 2. Images Slides (Magazine Grid Layout)
            let imgQueue = [...imagesData];
            while (imgQueue.length > 0) {
                let chunkCount = Math.min(Math.floor(Math.random() * 3) + 1, imgQueue.length);
                let chunk = imgQueue.splice(0, chunkCount);
                
                // تحديد شكل الشبكة بناءً على عدد الصور ليعطي شكل مجلة أنيق
                let gridClass = '';
                if (chunkCount === 1) gridClass = 'grid-cols-1';
                else if (chunkCount === 2) gridClass = 'grid-cols-1 md:grid-cols-2';
                else gridClass = 'grid-cols-1 md:grid-cols-3 md:grid-rows-2'; // 3 صور
                
                let imagesHtml = chunk.map((img, idx) => {
                    let zoomClass = Math.random() > 0.5 ? 'zoom-in' : 'zoom-out';
                    
                    // تنسيق خاص لثلاث صور (الصورة الأولى تأخذ مساحة كبيرة)
                    let colSpan = '';
                    if (chunkCount === 3) {
                        if (idx === 0) colSpan = 'md:col-span-2 md:row-span-2';
                        else colSpan = 'md:col-span-1 md:row-span-1';
                    }

                    let animDelay = idx * 0.25; // تتابع أنيق في ظهور الصور
                    
                    return `
                        <div class="img-wrapper ${colSpan}" style="animation-delay: ${animDelay}s">
                            <img src="${img}" class="${zoomClass}" alt="Event Photo" onerror="this.src='https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1000&auto=format&fit=crop'; this.onerror=null;">
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="slide" id="slide-${slideIndex++}">
                        <div class="w-11/12 h-[85vh] max-w-7xl grid ${gridClass} gap-6">
                            ${imagesHtml}
                        </div>
                    </div>
                `;
            }

            // 3. Video Slides
            videosData.forEach(vid => {
                html += `
                    <div class="slide" id="slide-${slideIndex++}" data-type="video">
                        <div class="w-11/12 max-w-6xl h-[85vh] rounded-3xl overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.8)] bg-black border-2 border-yellow-600/40 relative">
                            <video src="${vid}" class="w-full h-full object-contain" controls preload="metadata"></video>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            totalSlides = slideIndex;
        }

        // Logic Controls
        function startCelebration() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                bgMusic.play().catch(e => console.log("Audio play prevented", e));
                showSlide(currentSlide);
                startAutoPlay();
            }, 800);
        }

        function showSlide(index) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            
            if (index >= totalSlides) currentSlide = 0;
            if (index < 0) currentSlide = totalSlides - 1;

            const targetSlide = document.getElementById(`slide-${currentSlide}`);
            targetSlide.classList.add('active');

            handleSlideMedia(targetSlide);
        }

        function triggerConfetti() {
            const duration = 4000;
            const end = Date.now() + duration;

            (function frame() {
                // إطلاق زينة احتفالية ذهبية وبيضاء
                confetti({ particleCount: 6, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#bf953f', '#fcf6ba', '#ffffff', '#ffd700'] });
                confetti({ particleCount: 6, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#bf953f', '#fcf6ba', '#ffffff', '#ffd700'] });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function handleSlideMedia(slide) {
            // إيقاف أي فيديو يعمل
            document.querySelectorAll('video').forEach(vid => {
                vid.pause();
            });
            bgMusic.volume = 0.4; 

            // إذا كانت شريحة الفائزين -> شغل التصفيق والزينة
            if (slide.dataset.type === 'winners') {
                clapSound.currentTime = 0;
                clapSound.play().catch(e=>{});
                triggerConfetti();
            }

            // إذا كانت شريحة فيديو -> اخفض الموسيقى وشغل الفيديو
            if (slide.dataset.type === 'video') {
                const video = slide.querySelector('video');
                if (video) {
                    bgMusic.volume = 0.1; 
                    pauseAutoPlay();
                    video.play().catch(e=>{});
                    video.onended = () => {
                        if (isPlaying) {
                            nextSlide();
                            startAutoPlay();
                        }
                    };
                }
            }
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
            if(isPlaying) resetAutoPlayTimer();
        }

        function prevSlide() {
            currentSlide--;
            showSlide(currentSlide);
            if(isPlaying) resetAutoPlayTimer();
        }

        function togglePlay() {
            isPlaying = !isPlaying;

            if (isPlaying) {
                // إخفاء علامة التوقف
                pauseIndicator.classList.remove('opacity-100');
                pauseIndicator.classList.add('opacity-0');
                
                // استكمال الفيديو لو كان الشريحة فيديو، وإلا تشغيل المؤقت
                const activeVideo = document.querySelector('.slide.active video');
                if(activeVideo) {
                    activeVideo.play();
                } else {
                    startAutoPlay();
                }
            } else {
                // إظهار علامة التوقف
                pauseIndicator.classList.remove('opacity-0');
                pauseIndicator.classList.add('opacity-100');
                
                pauseAutoPlay();
                const activeVideo = document.querySelector('.slide.active video');
                if(activeVideo) activeVideo.pause();
            }
        }

        function startAutoPlay() {
            pauseAutoPlay(); 
            slideInterval = setInterval(nextSlide, slideDuration);
        }

        function pauseAutoPlay() {
            clearInterval(slideInterval);
        }

        function resetAutoPlayTimer() {
            const activeSlide = document.querySelector('.slide.active');
            if(activeSlide && activeSlide.dataset.type !== 'video'){
                startAutoPlay();
            } else {
                pauseAutoPlay();
            }
        }

        // Global Event Listeners (التحكم بالماوس والكيبورد)

        // 1. تقليب بالماوس في أي مكان
        document.body.addEventListener('click', (e) => {
            // منع التقليب إذا ضغط المستخدم على زر البداية أو فيديو
            if(e.target.closest('button') || e.target.closest('video') || e.target.closest('#start-overlay')) return;
            nextSlide();
        });

        // 2. التحكم بالكيبورد (الأسهم والمسطرة)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // منع نزول الصفحة بالمسطرة
                togglePlay();
            } else if (e.code === 'ArrowLeft') {
                nextSlide();
            } else if (e.code === 'ArrowRight') {
                prevSlide();
            }
        });

        // Initialize everything
        buildSlides();

    </script>
</body>
</html>
